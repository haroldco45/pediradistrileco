<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pedidos Distrileco</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d2b52">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --azul: #0d2b52;
  --azul-mid: #1a4080;
  --azul-light: #2563a8;
  --naranja: #f97316;
  --naranja-dark: #ea6c0a;
  --verde: #16a34a;
  --rojo: #dc2626;
  --gris: #64748b;
  --gris-light: #e2e8f0;
  --bg: #f0f4f8;
  --white: #ffffff;
  --shadow: 0 2px 12px rgba(13,43,82,0.12);
  --shadow-lg: 0 8px 32px rgba(13,43,82,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--azul); min-height: 100vh; }

/* HEADER ORIGINAL */
.header {
  background: var(--azul);
  padding: 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 40px; height: 40px; background: var(--naranja);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800; color: white; font-size: 18px;
}
.header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; color: white; font-size: 20px; letter-spacing: 0.5px; line-height: 1.1; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 400; }
.whatsapp-config-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: white; padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}
.header-tabs {
  display: flex; background: rgba(0,0,0,0.2); overflow-x: auto;
}
.tab-btn {
  flex: 1; min-width: 90px; padding: 10px 8px; border: none; background: transparent;
  color: rgba(255,255,255,0.6); font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase;
  letter-spacing: 0.5px; transition: all 0.2s; border-bottom: 3px solid transparent;
  white-space: nowrap;
}
.tab-btn.active { color: var(--naranja); border-bottom-color: var(--naranja); background: rgba(249,115,22,0.1); }

/* SECTIONS */
.section { display: none; padding: 16px; max-width: 700px; margin: 0 auto; }
.section.active { display: block; }

/* CARDS */
.card {
  background: white; border-radius: 12px; padding: 16px;
  box-shadow: var(--shadow); margin-bottom: 16px;
}
.card-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 16px; color: var(--azul); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 2px solid var(--gris-light); padding-bottom: 10px;
}

/* FORMULARIO */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--gris); text-transform: uppercase; }
.form-group input { border: 2px solid var(--gris-light); border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #fafcff; }

/* BUSCADOR */
.search-box-wrap { position: relative; margin-bottom: 12px; }
.search-box-wrap input { width: 100%; padding: 12px 40px 12px 14px; border: 2px solid var(--gris-light); border-radius: 10px; font-size: 14px; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--azul-light); border-radius: 0 0 10px 10px; max-height: 250px; overflow-y: auto; z-index: 50; box-shadow: var(--shadow-lg); }
.autocomplete-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--gris-light); }
.autocomplete-item:hover { background: #f0f6ff; }

/* TABLA PEDIDO */
.pedido-header, .pedido-row { display: grid; grid-template-columns: 70px 1fr 60px 70px 80px; gap: 6px; padding: 8px 10px; align-items: center; }
.pedido-header { background: var(--azul); color: white; border-radius: 8px 8px 0 0; font-size: 12px; font-weight: 700; text-transform: uppercase; }
.pedido-row { background: white; border-bottom: 1px solid var(--gris-light); }
.qty-input { width: 100%; text-align: center; padding: 6px 4px; border: 2px solid var(--gris-light); border-radius: 6px; font-weight: 700; }

.btn-action { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 10px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
.btn-whatsapp { background: #16a34a; color: white; grid-column: 1 / -1; padding: 16px; font-size: 17px; }

.tab-badge { background: var(--naranja); color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: 700; margin-left: 4px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--azul); color: white; padding: 12px 20px; border-radius: 10px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 300; }
.toast.show { opacity: 1; }
.hidden { display: none !important; }
.footer { background: var(--azul); color: rgba(255,255,255,0.5); text-align: center; padding: 20px; font-size: 11px; margin-top: 30px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-icon">D</div>
      <div>
        <div class="header-title">Distrileco</div>
        <div class="header-sub">Portal de Pedidos</div>
      </div>
    </div>
    <button class="whatsapp-config-btn" onclick="openWaConfig()">📱 WhatsApp</button>
  </div>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="showTab('tab-cliente')" id="btn-tab-cliente">👤 Cliente</button>
    <button class="tab-btn" onclick="showTab('tab-catalogo')" id="btn-tab-catalogo">📦 Catálogo</button>
    <button class="tab-btn" onclick="showTab('tab-pedido')" id="btn-tab-pedido">🛒 Pedido <span class="tab-badge" id="badge-count" style="display:none">0</span></button>
    <button class="tab-btn" onclick="showTab('tab-acciones')" id="btn-tab-acciones">⚡ Acciones</button>
  </div>
</div>

<div class="section active" id="tab-cliente">
  <div class="card">
    <div class="card-title">👤 Datos del Cliente</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre / Empresa *</label>
        <input type="text" id="cli-nombre" placeholder="Ej: Supermercado La 14" oninput="saveCliente()">
      </div>
      <div class="form-group">
        <label>Celular</label>
        <input type="tel" id="cli-celular" oninput="saveCliente()">
      </div>
      <div class="form-group full">
        <label>Dirección</label>
        <input type="text" id="cli-direccion" oninput="saveCliente()">
      </div>
    </div>
  </div>
  <button class="btn-action btn-primary" style="width:100%" onclick="showTab('tab-catalogo')">Ir al Catálogo →</button>
</div>

<div class="section" id="tab-catalogo">
  <div class="card">
    <div class="card-title">🔍 Buscador</div>
    <div class="search-box-wrap">
      <input type="text" id="search-prod" placeholder="Escribe producto o código..." oninput="searchProducts(this.value)">
      <div class="autocomplete-list" id="autocomplete-list" style="display:none"></div>
    </div>
    <div id="stat-total" style="font-size:12px; color:var(--gris); text-align:center;">Cargando...</div>
  </div>
</div>

<div class="section" id="tab-pedido">
  <div class="card" style="padding:0;">
    <div class="pedido-header">
      <div>Código</div><div>Producto</div><div>U/M</div><div>Cant.</div><div>Acc.</div>
    </div>
    <div id="pedido-list"></div>
    <div id="pedido-empty" style="text-align:center; padding:40px; color:var(--gris);">Tu pedido está vacío</div>
  </div>
</div>

<div class="section" id="tab-acciones">
  <div class="card">
    <div class="card-title">⚡ Acciones</div>
    <button class="btn-action btn-whatsapp" onclick="sendWhatsApp()">🚀 Enviar por WhatsApp</button>
    <button class="btn-action" style="background:#166534; color:white; margin-top:10px; width:100%" onclick="exportExcel()">📊 Guardar Excel</button>
    <button class="btn-action" style="background:var(--rojo); color:white; margin-top:40px; width:100%" onclick="clearAll()">🔄 Borrar todo y nuevo</button>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-qty">
    <div class="modal">
      <div class="modal-header" style="background:var(--azul); color:white; padding:15px;"><h3>Cantidad</h3></div>
      <div class="modal-body" style="padding:20px;">
          <p id="modal-qty-name" style="font-weight:700; margin-bottom:10px;"></p>
          <input type="number" id="modal-qty-input" value="1" min="1" style="width:100%; font-size:24px; text-align:center; border:2px solid var(--naranja);">
          <button class="btn-action btn-primary" style="width:100%; margin-top:15px;" onclick="confirmAdd()">Agregar</button>
      </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <strong>VIBRAS POSITIVAS HM</strong><br>
  © 2026 Derechos Reservados
</div>

<script>
// --- SERVICE WORKER ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => console.log('PWA Lista')).catch(err => console.log('Error SW', err));
  });
}

// --- CATALOGO (IMPORTANTE: Pega aquí tus 1700 items) ---
const CATALOGO_BASE = [
    {"codigo":"16026","nombre":"ARROZ SUPERARROZ 10BOL*10LBS","unidad":"BULTO"},
    {"codigo":"16023","nombre":"ARROZ SUPERARROZ 25LB*500G","unidad":"PACA"},
    {"codigo":"19501","nombre":"ACEITE MI CALDERITO 3000ML","unidad":"CJA"}
    // ... agrega el resto aqui
];

let pedido = JSON.parse(localStorage.getItem('distrileco_pedido')) || [];
let currentItem = null;

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('btn-' + id).classList.add('active');
  if (id === 'tab-pedido') renderPedido();
}

function searchProducts(q) {
  const list = document.getElementById('autocomplete-list');
  if (q.length < 2) { list.style.display = 'none'; return; }
  const res = CATALOGO_BASE.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase()) || p.codigo.includes(q)).slice(0, 10);
  list.innerHTML = res.map(p => `
    <div class="autocomplete-item" onclick="openQty('${p.codigo}','${p.nombre.replace(/'/g,"")}','${p.unidad}')">
      <strong>${p.codigo}</strong> - ${p.nombre}
    </div>`).join('');
  list.style.display = 'block';
}

function openQty(codigo, nombre, unidad) {
    currentItem = { codigo, nombre, unidad };
    document.getElementById('modal-qty-name').textContent = nombre;
    document.getElementById('autocomplete-list').style.display = 'none';
    document.getElementById('modal-qty').classList.remove('hidden');
}

function confirmAdd() {
    const qty = parseInt(document.getElementById('modal-qty-input').value);
    const exist = pedido.find(p => p.codigo === currentItem.codigo);
    if(exist) exist.cantidad += qty;
    else pedido.push({...currentItem, cantidad: qty});
    savePedido();
    document.getElementById('modal-qty').classList.add('hidden');
    document.getElementById('search-prod').value = '';
    updateBadge();
    toast("Agregado");
}

function renderPedido() {
  const list = document.getElementById('pedido-list');
  const empty = document.getElementById('pedido-empty');
  if (!pedido.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = pedido.map((p, i) => `
    <div class="pedido-row">
      <div style="font-size:10px">${p.codigo}</div>
      <div style="font-size:12px; font-weight:600">${p.nombre}</div>
      <div style="font-size:11px">${p.unidad}</div>
      <input type="number" class="qty-input" value="${p.cantidad}" onchange="updateQty(${i}, this.value)">
      <button onclick="delItem(${i})" style="color:red; background:none; border:none; font-weight:bold;">X</button>
    </div>`).join('');
}

function updateQty(i, v) { pedido[i].cantidad = parseInt(v); savePedido(); }
function delItem(i) { pedido.splice(i, 1); savePedido(); renderPedido(); updateBadge(); }
function savePedido() { localStorage.setItem('distrileco_pedido', JSON.stringify(pedido)); }
function updateBadge() { 
    const b = document.getElementById('badge-count');
    b.style.display = pedido.length ? 'inline' : 'none';
    b.textContent = pedido.length;
}

function saveCliente() {
    const c = {
        nom: document.getElementById('cli-nombre').value,
        cel: document.getElementById('cli-celular').value,
        dir: document.getElementById('cli-direccion').value
    };
    localStorage.setItem('distrileco_cli', JSON.stringify(c));
}

function sendWhatsApp() {
  const c = JSON.parse(localStorage.getItem('distrileco_cli')) || {};
  if (!pedido.length) { alert("Pedido vacío"); return; }
  let msg = `🏪 *PEDIDO DISTRILECO*\n👤 *Cliente:* ${c.nom || ''}\n📱 *Cel:* ${c.cel || ''}\n\n`;
  pedido.forEach(p => msg += `• ${p.nombre} x ${p.cantidad} ${p.unidad}\n`);
  window.open(`https://wa.me/573117700431?text=${encodeURIComponent(msg)}`);
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}

function clearAll() { if(confirm("¿Limpiar todo?")) { pedido=[]; savePedido(); localStorage.removeItem('distrileco_cli'); location.reload(); } }

window.onload = () => {
    const c = JSON.parse(localStorage.getItem('distrileco_cli'));
    if(c) {
        document.getElementById('cli-nombre').value = c.nom || '';
        document.getElementById('cli-celular').value = c.cel || '';
        document.getElementById('cli-direccion').value = c.dir || '';
    }
    document.getElementById('stat-total').textContent = CATALOGO_BASE.length + " productos en lista";
    updateBadge();
};
</script>
</body>
</html>
